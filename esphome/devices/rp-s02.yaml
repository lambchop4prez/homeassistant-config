---
# Original Tasmota configuration
# http://mytasmota.com/forum/firmware/RP-S02_esp32c3.bin
# {"NAME":"RP-S02 Switch","GPIO":[0,0,225,32,321,320,0,0,576,0,0,0,0,0,0,0,0,0,224,33,0,0],"FLAG":0,"BASE":1}
substitutions:
  button_1_pin: GPIO03
  relay_1_pin: GPIO18
  relay_1_status_pin: GPIO05
  button_2_pin: GPIO19
  relay_2_pin: GPIO02
  relay_2_status_pin: GPIO04
  device_status_pin: GPIO08

packages:
  base: !include ../common/base.yaml

esphome:
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3  
# added the line below to prevent bootloops when flashing factory bin via serial
    board_build.flash_mode: dio

esp32:
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"   

status_led:
  pin:
    number: $device_status_pin
    inverted: true

output:
  - platform: gpio
    pin: $relay_1_pin
    id: relay_1
  - platform: gpio
    pin: $relay_2_pin
    id: relay_2

switch:
  - platform: gpio
    pin:
      number: $relay_1_status_pin
      inverted: true
    id: relay_1_status
    internal: true
  - platform: gpio
    pin:
      number: $relay_2_status_pin
      inverted: true
    id: relay_2_status
    internal: true

binary_sensor:
  - platform: gpio
    pin: $button_1_pin
    id: button_1
    filters:
      - delayed_off: 50ms
  - platform: gpio
    pin: $button_2_pin
    id: button_2
    filters:
      - delayed_off: 50ms

