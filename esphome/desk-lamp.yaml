substitutions:
  name: desklamp
  friendly_name: "Desk Lamp"
  time_id: current_time
  api_encryption_key: !secret desk_lamp_encryption_key
  ota_password: !secret desk_lamp_ota_password

packages:
  device_base: !include ./devices/sonoff-minir4-extreme.yaml
  bluetooth_proxy: !include ./components/bluetooth-proxy.yaml
  time: !include ./components/ntp.yaml

light:
  - platform: binary
    id: light_1
    name: ${friendly_name}
    icon: mdi:desk-lamp
    restore_mode: restore_default_off
    output: relay

binary_sensor:
  - id: !extend button
    on_press:
      - light.toggle:
          id: light_1
  - id: !extend input
    on_press:
      - light.toggle:
          id: light_1

datetime:
  - platform: template
    id: turn_on_time
    time_id: $time_id
    type: time
    initial_value: "10:00:00"
    optimistic: true
    restore_value: true
    on_time:
      then:
        - light.turn_on: light_1

  - platform: template
    id: turn_off_time
    time_id: $time_id
    type: time
    initial_value: "21:00:00"
    optimistic: true
    restore_value: true
    on_time:
      then:
        - light.turn_off: light_1
