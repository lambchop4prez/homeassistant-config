text_sensor:
  - platform: template
    id: today_low
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_templow
            text: 
              format: "%s°"
              args: [x.c_str()]
  - platform: template
    id: today_high
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_temphigh
            text: 
              format: "%s°"
              args: [x.c_str()]
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: outdoor_temperature
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_temp
            text:
              format: "%s°"
              args: [x.c_str()]

