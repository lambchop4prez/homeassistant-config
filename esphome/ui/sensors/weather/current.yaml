  - platform: homeassistant
    entity_id: weather.forecast_home
    attribute: wind_bearing
    id: wind_bearing
    internal: true
    on_value:
      then:
        - lvgl.indicator.update:
            id: line_wind_bearing
            value: !lambda return atoi(x.c_str());
