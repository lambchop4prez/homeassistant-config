        - "\U000F0590" # cloudy
        - "\U000F0595" # partlycloudy
        - "\U000F0591" # fog
        - "\U000F0592" # hail
        - "\U000F0593" # lightning
        - "\U000F067E" # lightning-rainy
        - "\U000F0596" # pouring
        - "\U000F0597" # rainy
        - "\U000F0F36" # snowy
        - "\U000F067F" # snowy-rainy
        - "\U000F0599" # sunny
        - "\U000F059D" # windy
        - "\U000F059E" # windy-variant
        - "\U000F0F38" # exceptional
        - "\U000F14E4" # unknown
  font_current_conditions_small: !include
    file: ../components/icons.yaml
    vars:
      id: font_current_conditions_small
      size: 64
      glyphs:
        - "\U000F0594" # clear-night
        - "\U000F0590" # cloudy
        - "\U000F0595" # partlycloudy
        - "\U000F0591" # fog
        - "\U000F0592" # hail
        - "\U000F0593" # lightning
        - "\U000F067E" # lightning-rainy
        - "\U000F0596" # pouring
        - "\U000F0597" # rainy
        - "\U000F0F36" # snowy
        - "\U000F067F" # snowy-rainy
        - "\U000F0599" # sunny
        - "\U000F059D" # windy
        - "\U000F059E" # windy-variant
        - "\U000F0F38" # exceptional
        - "\U000F14E4" # unknown
  font_icons: !include
    file: ../components/icons.yaml
    vars:
      id: font_icons
      size: 20
      glyphs:
        - "\U000F10C2" # Temperature High
        - "\U000F10C3" # Temperature Low
        - "\U000F050F" # Thermometer
        - "\U000F07E4" # CO2
        - "\U000F054B" # umbrella
        - "\U000F0592" # hail
        - "\U000F0593" # lightning
        - "\U000F067E" # lightning-rainy
        - "\U000F0597" # rainy
        - "\U000F0F36" # snowy
        - "\U000F0594" # clear-night
        - "\U000F0599" # sunny
        - "\U000F07CA" # fuel
        - "\U000F024A" # flower
        - "\U000F051F" # time-remaining
        - "\U000F140B" # Energy
        - "\U000F059B" # Sunset
        - "\U000F059C" # Sunrise
        - "\U000F0BAC" # Molecule (VOC)
        - "\U000F0079" # Battery full
        - "\U000F058E" # % drop (RH)
        - "\U000F029A" # gague
