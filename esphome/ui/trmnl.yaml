        - "\U000F0922" # wifi med
        - "\U000F0925" # wifi high
        - "\U000F0928" # wifi max
        - "\U000F092E" # wifi disconnected
        - "\U000F143F" # 1 o'clock
        - "\U000F1440" # 2 o'clock
        - "\U000F1441" # 3 o'clock
        - "\U000F1442" # 4 o'clock
        - "\U000F1443" # 5 o'clock
        - "\U000F1444" # 6 o'clock
        - "\U000F1445" # 7 o'clock
        - "\U000F1446" # 8 o'clock
        - "\U000F1447" # 9 o'clock
        - "\U000F1448" # 10 o'clock
        - "\U000F1449" # 11 o'clock
        - "\U000F144A" # 12 o'clock

color:
  - id: display_white # Really black, but will appear white on e-paper
    hex: "${display_white}"
  - id: display_black # Really white, but will appear black on e-paper
    hex: "${display_black}"


image:
  - file: ./images/doof.png
    id: bidoof
    resize: 200x200
    type: BINARY
    dither: FLOYDSTEINBERG
    invert_alpha: true
  - file: mdi:triangle
    id: indicator
    type: BINARY
    resize: 20x20

lvgl:
  theme:
    image:
      image_recolor: display_black
      image_recolor_opa: "100%"
    label:
      text_font: font_small
      text_color: display_black
  bg_color: display_white
  buffer_size: "12%"
  displays:
    - display_main
  top_layer:
    widgets:
      - obj:
          bg_opa: TRANSP
          border_opa: TRANSP
          pad_all: 0
          layout:
            type: flex
            flex_flow: row
            flex_align_main: SPACE_BETWEEN
            flex_align_track: CENTER
            flex_align_cross: stretch
          x: 3
          y: 1
          width: $display_width
          height: 36
          widgets:
            - label:
                text: "\U000F007E"
                text_font: font_icons_tiny
            - label:
                text:
                  time_format: "%a %B %d %Y"
                  time: !lambda return id(current_time).now();
            - label:
                text: "\U000F05AA"
                text_font: font_icons_tiny

  pages:
    - !include { file: ./pages/weather.yaml, vars: {display_width: $display_width, display_height: $display_height}}
