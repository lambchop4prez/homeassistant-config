---
esphome:
  includes: [icons.h]
packages:
  weather: !include ./sensors/weather.yaml
  sun: !include ../components/sun.yaml
  font_large: !include
    file: ../components/font.yaml
    vars:
      name: IntoneMonoNerdFontMono-Medium.ttf
      size: 36
      id: font_large
  font_small: !include
    file: ../components/font.yaml
    vars:
      name: IntoneMonoNerdFontMono-Regular.ttf
      size: 16
      id: font_small
  font_small_medium: !include
    file: ../components/font.yaml
