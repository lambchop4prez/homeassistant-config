        - "\U000F0590" # cloudy
        - "\U000F0595" # partlycloudy
        - "\U000F0591" # fog
        - "\U000F0592" # hail
        - "\U000F0593" # lightning
        - "\U000F067E" # lightning-rainy
        - "\U000F0596" # pouring
        - "\U000F0597" # rainy
        - "\U000F0F36" # snowy
        - "\U000F067F" # snowy-rainy
        - "\U000F0599" # sunny
        - "\U000F059D" # windy
        - "\U000F059E" # windy-variant
